name: PR Workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true
'on':
  pull_request_target:
    types:
    - labeled
    - synchronize
    - reopened
    - opened
    branches:
    - master
jobs:
  test:
    if: contains(github.event.pull_request.labels.*.name, 'safe to test')
    uses: ./.github/workflows/testAndSanity.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
  build-snapshot:
    name: Build OCI snapshot
    needs: test
    if: contains(github.event.pull_request.labels.*.name, 'safe to test')
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          arch: amd64
          platform: linux/amd64
        - os: ubuntu-latest
          arch: arm64
          platform: linux/arm64
    steps:
    - name: Prepare
      run: "platform=${{ matrix.platform }}\necho \"PLATFORM_PAIR=${platform//\\//-}\"\
        \ >> $GITHUB_ENV     \n\n# list all registries to push to and join all non-empty\
        \ with comma\n# https://unix.stackexchange.com/a/693165/116849\n# https://stackoverflow.com/a/9429887/1469797\n\
        strings=(\"${VARS_DOCKERHUB_SLUG}\" \"${VARS_GHCR_SLUG}\")\nfor i in ${!strings[@]};\
        \ do [[ -z ${strings[i]} ]] && unset strings[i]; done\njoined_string=$(IFS=,\
        \ ; echo \"${strings[*]}\")\necho \"REGISTRIES_JOINED=$joined_string\" >>\
        \ $GITHUB_ENV \n"
      env:
        VARS_DOCKERHUB_SLUG: ${{ vars.DOCKERHUB_SLUG }}
        VARS_GHCR_SLUG: ${{vars.GHCR_SLUG}}
    - name: Set short git commit SHA
      run: 'short=$(echo "${{ github.event.pull_request.head.sha }}" | head -c7)

        echo "COMMIT_SHORT_SHA=$short" >> $GITHUB_ENV

        '
    - name: Get App Version
      id: appversion
      env:
        APP_VERSION: ${{ format('pr{0}-{1}', github.event.number, env.COMMIT_SHORT_SHA
          ) }}
      run: 'echo appversion=$APP_VERSION >>${GITHUB_OUTPUT}

        '
    - name: Login to Docker Hub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Login to GitHub Container Registry
      if: ${{ vars.GHCR_SLUG != '' }}
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
      with:
        context: ${{github.event.pull_request.head.repo.clone_url}}#${{github.event.pull_request.head.sha}}
        build-args: 'APP_BUILD_VERSION=${{steps.appversion.outputs.appversion}}

          '
        platforms: ${{ matrix.platform }}
        labels: ${{ steps.meta.outputs.labels }}
        outputs: type=image,"name=${{ env.REGISTRIES_JOINED }}",push-by-digest=true,name-canonical=true,push=true
    - name: Export digest
      run: "mkdir -p /tmp/digests\ndigest=\"${{ steps.build.outputs.digest }}\"\n\
        touch \"/tmp/digests/${digest#sha256:}\"          \n"
    - name: Upload digest
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: digests-${{ env.PLATFORM_PAIR }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1
  release-snapshot:
    name: Merge OCI Images and Push
    if: ${{ vars.DOCKERHUB_SLUG != '' ||  vars.GHCR_SLUG != '' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    needs:
    - build-snapshot
    - test
    steps:
    - name: Download digests
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true
    - name: Login to Docker Hub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Login to GitHub Container Registry
      if: ${{ vars.GHCR_SLUG != '' }}
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893
      with:
        images: '${{ vars.DOCKERHUB_SLUG }}

          ${{ vars.GHCR_SLUG }}

          '
        tags: 'type=ref,event=pr

          '
        flavor: 'latest=false

          '
        labels: 'org.opencontainers.image.title=Multi-Scrobbler

          org.opencontainers.image.description=Scrobble from many sources to many
          clients

          org.opencontainers.image.vendor=FoxxMD

          '
    - name: Create manifest list and push dockerhub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      working-directory: /tmp/digests
      run: "docker buildx imagetools create $(jq -cr '.tags | map(\"-t \" + .) | join(\"\
        \ \")' <<< \"$DOCKER_METADATA_OUTPUT_JSON\") \\\n  $(printf \"${VARS_DOCKERHUB_SLUG}@sha256:%s\
        \ \" *)\n"
      env:
        VARS_DOCKERHUB_SLUG: ${{ vars.DOCKERHUB_SLUG }}
    - name: Create manifest list and push gchr
      if: ${{ vars.GHCR_SLUG != '' }}
      working-directory: /tmp/digests
      run: "docker buildx imagetools create $(jq -cr '.tags | map(\"-t \" + .) | join(\"\
        \ \")' <<< \"$DOCKER_METADATA_OUTPUT_JSON\") \\\n  $(printf \"${VARS_GHCR_SLUG}@sha256:%s\
        \ \" *)\n"
      env:
        VARS_GHCR_SLUG: ${{ vars.GHCR_SLUG }}
    - name: Inspect image dockerhub
      if: ${{ vars.DOCKERHUB_SLUG != '' }}
      run: 'docker buildx imagetools inspect ${VARS_DOCKERHUB_SLUG}:${STEPS_META_OUTPUTS_VERSION}

        '
      env:
        VARS_DOCKERHUB_SLUG: ${{ vars.DOCKERHUB_SLUG }}
        STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
    - name: Inspect image ghcr
      if: ${{ vars.GHCR_SLUG != '' }}
      run: 'docker buildx imagetools inspect ${VARS_GHCR_SLUG}:${STEPS_META_OUTPUTS_VERSION}

        '
      env:
        VARS_GHCR_SLUG: ${{ vars.GHCR_SLUG }}
        STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
  combine-and-comment:
    name: Leave comment
    runs-on: ubuntu-latest
    needs: release-snapshot
    if: contains(github.event.pull_request.labels.*.name, 'safe to test')
    steps:
    - name: Create comment
      uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
      with:
        recreate: true
        header: pr-release
        message: '#### :package: A new release has been made for this pull request.


          To play around with this PR, pull an image:

          * `foxxmd/multi-scrobbler:pr-${{ github.event.number }}`


          Images are available for x86_64 and ARM64.


          > Latest commit: ${{ github.event.pull_request.head.sha }}

          '
